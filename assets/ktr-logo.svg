<svg width="560" height="150" viewBox="0 0 560 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KTR WebSolution</title>
  <desc id="desc">KTR WebSolution premium agency wordmark logo.</desc>
  <defs>
